front:
  text: 序醫道之小焉者也於小道中而以喉科著抑又小矣然玉霜一點紅粉半廛遽爾既危於俄頃起沉疴於斯須人巧極天工錯即未窺全豹而小中見大施濟之功在焉豫添列黌宮未暇問岐黃術而習見夫庸醫之誤人也貪夫之徇利也早無以為饔夕無以為飧者之鳴號焉而莫如引手救也慨然念士生當世不獲身名民社以宏輔相或得一術以濟人於危急何莫非立達之初心奈役役半生願莫之遂今年秋假館東山之麓陳生在豐以五十金得是編於梁溪尤氏豫叨一日長得晏然有之此固生之雅意抑亦豫之急想世手而鬼神通之者歟而豫於此竊自念也傳曰正其誼不謀其利明其道不計其功聖賢其事日月為昭人能本此意以行之內省可無漸矣人有裨益道雖小也利實溥焉此世上齷齪小夫嚖為利事耳道於何有哉爰述數語以自警且使後之子孫勿視為尋常方藥而傳之非人抑知此為明道之書而勿開利竇也乾隆歲次辛丑中秋後余假館於蠡河之南惠氏深想數年借得私時祕録乾隆乙卯年浙慈馮岩峰授傳手録
