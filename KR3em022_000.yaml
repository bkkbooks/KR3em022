body:
  text: 喉症總論咽喉為人身呼吸飲食門戶方寸之地受病危險其症甚繁大約其要總歸於火蓋少陰少陽君相二火其脈並絡於咽喉故往往為火症之所結聚君火勢緩則結而為疼為腫相火勢速則腫甚不仁而為痹痹甚不通則痰塞以死經云一陰一陽結為喉痹火者痰之本痰者火之標火有虛實實火應過食煎炒炙煿蘊結積毒其症煩渴二便祕塞風痰上壅將發喉痹症先胸隔不利脈弦而數治宜先去風痰後解熱毒虛火或應飲酒太過或應忿怒或應色欲火炎上攻咽喉乾燥必二便如常少陰心脈微治宜補虛降火凡用藥不宜純用寒涼取效目前上熱未除中寒復起毒氣乘虛入腹胸前高腫上喘下泄手足指甲青黑七日以後全不進食口如魚口者死且治喉症最忌發汗誤人不淺或針砭出血已具汗意但凡寒傷於腎及帝中腫者切不宜針至如內傷虛損咽喉失音無法可治矣帝中即喉嚨花喉症初起一日寒戰即生者發後身涼口不碎又無重舌或二便俱利不可認作熱症皆因陰氣虛寒而發其痰不可吊盡蓋此痰即身中津液所化與熱症乳鵝舌䪞舌之痰以流盡而愈者不同若亦流盡則精神竭而必斃先以藥吹或用水渙之法使喉一通即便服藥初劑發散和解第二劑即施溫補資養之藥設三四日後再發寒戰或心痛骨痛脅疼等症皆屬難治發時牙關緊閉舌喉俱腫口碎而臭或有重舌及舌上有黃屑發屑者發後下午再發寒熱二便祕塞者即作熱症用石膏敗毒散主之然易愈之症如漸起之症三四日後而發寒熱者雖凶亦不為害惟有症未減而牙關反不緊閉唇口不腫而紋如好人者不治舌腫口滿者不治色如胡桃茄子砂紙者不冶或連重舌發寒熱猶可治也舌以箸按之其色雪白起箸即紅紫色此身內之血已死然口臭者猶可或生尤忌口渴氣急痰多而稠如桃膠者死其至矣一頸俱紅腫者亦極危也面紅帶紫面青帶白神氣少者俱不治不語者死略能語者尚有可生之機面色少神喜坐低處者亦極難治夫帝中性命所關舌下紫腫為舌系下通於腎白腫不治傷者必死凡看喉症必先看當心之中有紅色者不治如紫黑者尤危俱不可下藥記之慎之凡喉看法必先刺所發一邊手之少商穴如血流不出者必死在頃刻即好處一邊流出血紫黑色者亦死之症業是者貴辨之審也咽喉門喉痹屬痰屬風屬熱皆應鬱火而兼熱毒腫甚不仁乃咽喉之重症喉痹者總名也要去風痰解毒開鬱悶其症自愈乳鵝有單有雙有連珠多應酒色鬱結而生初起一日痛二日紅腫三日有形細白星無細星即喉癰發寒熱者凶四日勢定治之四五日可愈其症生於喉旁一邊生者為單鵝左右生者為雙鵝單輕雙重連珠尤重左右為心肝二白星下下相連狀如纏袋者為連珠鵝喉菌病屬憂鬱血熱氣滯婦人多患之形如浮萍略高而厚紫色生於喉旁輕則半月二十日重則徑月月餘要在治之得法及患者守欲忌口喉癬虛火上炎肺金火旺致攻喉間生如絲如景窯紋樣又如秋海棠葉背後紅絲一般飲食阻礙咽痛雖不傷命久則喉啞失音而不能救矣喉癰此因過食辛辣炙煿厚味醇酒感熱而生屬肺病喉間無形狀但紅腫而痛重者亦發寒熱頭痛四五日可愈舌䪞舌喉癰舌䪞舌病也音殺肥人感熱性躁者多患此症凡舌下生如小舌樣者為舌䪞舌如連喉腫痛者即為喉癰不痛者非是大抵舌䪞舌兼喉癰者勢凶喉關傷寒後發難治為氣閉不通無形無聲纏喉風因心中躁急而發先二日必胸膈氣緊出氣短促然咽喉腫痛手足厥冷頸如絞轉熱結於內腫繞於外且麻且癢喉內紅絲纏繞手指甲白色手心壯熱喉腫而大風痰壅盛如曳鋸聲是其候也最為忌症初起一日即治可治若過一日夜目直視喉間如雷聲者不治燈火近患人吹滅者不治若喘急額汗者危在旦夕又云纏者自頤纏繞赤色寒熱又口開而不闔者是其候必待過一周時無恙方可用藥宜極早回頭喉刺多因先患勞病重症既久虛火上升榮血已枯其喉上顎有紅點密密如蚊蟲咬斑樣此係危篤將殂勿治口牙舌頸面腮門牙槽風初起先齒痛不已後即牙齦肉浮腫紫黑色或出血久則腐爛牙漏即前症久而不愈齒縫中出白膿極難調治甚則齒落如上左邊門牙落者不治以上二症皆屬胃火腎虛牙癰一名牙棋風初起有一小塊生於牙根肉上或上或下或內或外其狀高硬牙癰牙舌䪞牙菌三病大同小異治法亦不難牙咬生於牙盡咬中齒不能開牙關緊閉此症初起勢重甚至夜尤甚然亦不難治亦不妨命牙舌䪞屬胃火如豆大生無定處或內或外牙宣齒縫出血上屬脾下屬胃實火上攻所致亦有胃虛火動腐爛牙根以致淡血時時滲漏不已牙菌並荏生於牙根其狀紫黑色高低如菌狀此係火盛血熱而兼氣滯穿牙疔先三日牙痛發寒熱後痛不可忍牙根上發紫塊者是也穿牙毒即前症初起者未破為疔已破即為穿牙毒其色紅者可治青者不可治疔毒又與牙槽風牙漏相是治法亦相仿走馬牙疳或因胎毒痘毒後發致牙根腐爛成疳殺人最速鼻梁上發紅點者不治其色如干醬一日爛一分二日爛一寸故名走馬以喻速也有齒者落盡而死上爿左邊門牙為牙之主此牙一落其餘盡落若此牙不落余牙雖落可能為治小兒走馬疳及大人牙槽風均皆如是看法崩砂疳口風自舌下牙根上腫赤口內作痛如燙熱牙根漸爛亦以脫牙為患方見舌症舌癰舌紅而腫大屬心經火盛地角亦紅腫舌黃舌上黃生腫痛亦屬心火方見舌症木舌舌頭腫大如煮熟豬肝不能轉動憂鬱所致又有一種生舌根下如白棗有青紫筋不能速愈初起不痛不發寒熱漸至腫大初起易愈遲則難痊亦以憂鬱所致即是重舌方見舌症舌菌屬心經火多因氣鬱而生生舌上或如木耳或如菌狀其色紅紫方見舌症懸癰口裡顎上紫泡如豆大者是紫舌脹屬心火內必煩躁悶亂糜疳滿口糜爛與小兒口疳同治法鵝口一名雪口初生月內小兒滿口舌上白屑如鵝口樣故名馬牙即板牙日逐要挑乃用針挑破初生小兒胎內受過熱毒見風即生但看牙根上有白色如脆骨者是此症欲發出胎即打噴嚏含乳或吞或吐而不吮其病已深若不急治入腹即死切勿認作黃疸之類出胎即要細看日逐要挑至三四日病即成五六日堅硬難治甚有發而再發大約一月外方可免此患頸癰胸前紅腫形在外亦欲內攻甚則喉腫閉而出膿面癰相仿前症屬腎托腮癰生於腮下因飲食厚味多飲醇酒熱毒所致連珠口疳風自舌下起小泡初起一個又起一個甚至多多連珠生起繭唇風症此乃陽明胃經因煿炙所致或兼思慮暴怒痰隨火行流至於唇而結如豆大若蠶繭突腫堅硬作痛飲食妨礙或破流血久則難治若初起無內症用麻子大艾炷灸三壯貼蟾酥膏蓋之日久漸愈若有內症作渴早服八味丸午服甘露飲日久流血不止形弱面黑虛熱痰生腮顴紅而口渴甚者難治清涼甘露飲犀角茵陳石斛枳殼麥冬生地黃芩柴胡知母生甘草枇杷葉各一錢燈草淡竹葉喉症治法凡喉症至五日即重如三日前症雖重尚未成膿藥能消散若至五六日患處多成膿隨便穿破後必爛成一窠而難愈爛處須用口疳藥多用龍骨珍珠凡傷寒後患連珠鵝及喉閉者不治其症喉項強硬目睛上視故多不治凡喉症非急症一二日未必發寒熱病尚輕緩若至第三日發寒熱症必加重須問其大小便通利否如二便利症雖加不過浮火上攻服解毒消風清火之劑即愈若二便不通利乃內有實火非用降火解毒重劑及通二便之藥火從何而泄病從何而解亦即問其頭可痛否如頭痛則兼傷寒難治凡喉症非俟其大便出後方可望痊若大便祕結未可輕許其無礙凡喉症初起大便祕結宜用大黃玄明粉通之則火自降而易痊即降火解毒之劑內去前胡加大黃玄明粉行之若至五六日久不食而大便祕用之即刻斃蓋病久胃氣已虛豈宜再用硝黃只宜用蜜導法此祕訣也凡患喉症無痰者不治凡患喉症須吹藥四五管方可出痰三次可以全愈其出痰初用必要多用金丹為妙必直對喉嚨中重重吹之即提出吹管恐痰即嘔出凡喉症初起一二日用碧丹漸加金丹勢甚者金丹為君或純用金丹方能吊出頑痰出痰非金丹不可凡喉症至胸前紅腫此係肺癰用蜜調加百藥煎服之凡喉中無形而紅痛者用燈草灰吹之凡婦人喉中腫痛有因經閉致火上攻而患者宜內服通經藥經通則喉自愈凡喉症凶者面發腫白亮無光彩脈沉微無力是神氣外泄無陽之症斷不可治若面發紅腫脈來洪大有力症雖重是有元氣火盛治之易痊凡腮內口內腫爛用箸纏絲綿蘸水輕攪患處痛者用藥必愈如不痛者即死肉多難治凡舌腫脹滿口吐舌在外難以納藥者用殭蠶皂角俱研極細末等分和勻少許吹入鼻中牙關自開痰涎自出然後用綿纏竹箸蘸甘草湯潤其唇口再加用四味口疳藥多加頂高冰片頻吹自愈凡吹藥不但腫碎患處並四圍好肉上亦要吹之方不散開且易愈也至若舌上幹甚難於吹藥或用蜜潤或用湯水濕之藥可吹上喉內吹法須用氣和平用管周遍為妙凡舌腫大用生黃柏末加冰片敷之或出血用炒柏加冰片敷之凡舌䪞舌喉癰如大便閉應藥內加玄明粉大黃小便不利加六一散服之甚效一法也凡用碧丹症凶者冰片多於甘草將愈甘草多於冰片凡患牙癰牙根紅腫但牙關不閉口能開闔若患牙咬牙根紅腫脹肉突出凡牙關緊閉口不能開者先用金碧二丹吹入牙根外用黃熟香削成鑿子樣漸挨進牙縫則牙關漸開即將金丹吹入患處凡吹喉症或欲出痰加皂角少許凡初起吹藥須令患者低頭溜出痰涎唾凡喉癰及單雙鵝率用碧丹其他重症金丹碧丹兼用須知先後多寡初起碧九分金一分吹至五管改用碧八金二再次用碧丹七分金丹三分如症重碧金各半用至三五次後痰涎必上壅然後用金六碧四將吹管直對喉中重吹一吹隨手出管即吊出痰此要訣也若症極重竟用金八分碧二分尤妙凡喉症先碎先用長肉藥吹之後用碧丹以治之通經方孕婦忌服當歸赤芍廣皮川斷各一錢牛膝一錢五分川芎六分紅花七分甘草五分桔梗一錢血熱加大生地丹皮熱極再加犀角經久不行加蘇木五靈子澤蘭葉腹痛加元胡索桃仁股痛加杜仲倍牛膝膏滋藥即蜜調青炭色用龍腦薄荷為君玉丹為臣川貝去心為佐燈草灰百草霜甘草冰片為使先將玉丹百草霜研和後入燈草灰再研再入薄荷甘草川貝研極細再入冰片再研勻蜜調服喉癰喉菌須時時噙咽若症重兼服三劑及吹藥製藥法則制硝礬法別名玉丹又名雪霜先用生礬一兩打碎如豆大入銀罐內入爐用桴炭火煅煬以食箸刺入罐底攪之無塊為妙次將上好硝三錢打小塊投下約十分之三再次將白硼砂三錢打碎投下亦十分之三少頃再投入生礬逐漸投下候煬盡照前投硝硼少許如是逐漸投完直待浦起罐口發如饅頭樣方可加起炭火燒至乾枯然後用淨瓦一大張覆罐口一時取起將牛黃少許為細末用清水五六匙調和以匙超滴丹上將罐仍入火內烘乾即取起連罐覆潔淨地上先以紙襯地罐上仍用碗覆之過七日收貯聽用須輕鬆無監紋者佳如有監紋者不堪用或留作蜜調用亦好算敷藥煅時初起火宜緩然亦不可太緩恐致礬僵定難溶化後必監實有紋中間及後須用武火又加礬末煬盡即投硝硼必不能全化以致堅實有紋矣須用傾過之舊罐取其入爐不爆碎也如用新罐先將炭烘過然後入爐亦不可放濕炭上烘使濕氣入罐經火必碎又說傾銀過之罐恐猶有毒氣此丹宜製備愈久愈妙取百草霜法須燒茅柴者謂之百草霜取其近底者鍋心及鍋口邊俱不可用先刮去浮面一層後刮去中一層不可重刮蓋著鍋第三層又不堪用制黃柏法先揀好者切片用荊芥穗為君甘草為臣浸煎濃湯浸至片子柔軟取起攤瓦上慢火炙至金色如焦者去之再入白蜜湯煎過一次曬乾聽用制人中白法取多年溺器用水灌滿置火爐上滾則傾出如是數次去淨穢氣用鹽泥封固大火煅之半日取起冷定去泥殼取器內淡紅者收貯用之久置地上出火毒氣為妙制牙皂法取堅小不蛀者瓦上炙至其色光明而脆去兩頭聽用制殭蠶法揀其直細而腹小者為雄若腹大而粗者為雌不用將牙刷蘸水刷去石灰瓦上慢炙至醬色要折斷中間無絲連者研細聽用制燈草灰法務擇其白色者先鋪在桌上以清水噴濕候心內潮潤將竹管堅固不碎兩頭厚薄相勻者以水浸管內以濕紅布團塞緊一頭即將燈心塞入以竹箸捶實傾去水如是逐漸塞滿再用濕紅布塞實入桴炭火煅之觀其煙盡及管內通紅取出放潔淨平地上須以水預噴濕地上用碗覆之待冷取起剝去外面之灰打開看藥灰黑色成團者佳煅時勿令竹管爆碎碎則無用不可煅過過則灰白不可煅生生則不成灰此藥最輕宜多備制槍硝法擇其明淨紋路槍槍然者故名又名馬牙硝以其長白如牙而厚大者先以溫湯蘸過綿花挹干仍用紙包放灶上椒鹽洞內五六日收其濕氣自干白如霜或如提玄明粉法提過數次則味淡而性平且合藥可以久留此要臘天製為妙此金丹內用玉丹內用不必如此制碧丹配合法每玉丹三分配百草霜半匙乳鉢研細次入燈草灰一釐配成如瓦灰色再加甘草末三匙薄荷末二分研極細然後入好冰片半分多加尤妙再研勻入小瓷罐塞頭要深勿令出氣此藥須臨時配合若五六日即無用如遇陰雨天一日即無用凡春夏薄荷多玉丹少藥成青色秋冬玉丹多薄荷少藥成白色此要訣也豫初得是本云再加硼砂少許如要出痰再加皂莢少許薄荷龍腦者佳梗細葉小梗粗葉大者卻不堪用金丹配合法每提過槍硝一錢八分配蒲黃生用二分絹篩取細末去粗褐色者共研細次下殭蠶一分牙皂一分半共研淡黃色加冰片一分研勻此藥可以久用惟冰片臨用加入此藥專治消腫出痰牙咬舌䪞牙穿牙疔毒用此治之咽喉等症則兼用碧丹看症加減用症重者再加牛黃於本方內如喉症重及瘋加殭蠶牙皂輕症只用牙硝蒲黃蓋碧丹消痰清熱解毒驅風故為良劑尚屬平緩不如金丹消腫毒除風熱開喉閉出痰涎最為神要但喉症初起金丹不宜多用因其能直透入內且善走散若初起即多用之恐輕症不能勝藥力反與捍格不相入也口疳藥即能長肉每薄荷三分配孩兒茶一分半制柏末一釐白龍骨二釐白芷取堅白細小者為末釐半如腫痛用三四釐生甘草末半分珍珠新白制末半分配合研末加冰片三釐再研勻入瓷瓶收貯凡遇口碎及各樣口疳吹之初痛腫起而熱甚者多薄荷取其辛涼能發散也若還不腫熱不甚病久宜以長肉為主本方多用兒茶珍珠龍骨配成紫色及一切喉症碎者亦用此長肉如治走馬疳串牙毒及極重口疳初生小兒胎毒口疳本方加牛黃倍珍珠無不奏效惟臭腐而黑者不治治痧痘後口疳去黃柏龍骨加牛黃倍珍珠即症逆極凶無不立效餘症如之無不神應此係口疳祕訣喉症煎藥主方元參黃芩牛蒡子前胡連翹殼山梔栝蔞根桔梗生甘草薄荷或加金銀花如發寒熱加柴胡頭痛加煅石膏口乾加麥冬知母胸膈飽悶加枳殼鬱熱加芍藥貝母竹茹舌症煎藥主方山梔仁黃連舌乃心之苗用得木通連翹殼犀角不過一錢生地丹皮赤芍麥冬生甘草如兼口唇必用煅石膏少瀉脾火如有郁有痰加川貝便閉加大黃朴硝枳殼病後忌用寒涼牙症煎藥主方齒乃腎之標骨之餘足陽明胃經之脈貫絡牙齒齒齦手陽明大腸之脈貫絡下齦屬腎有風熱有腎虛元參丹皮知母地黃甘草梢山梔地骨皮黃柏車前白芍如熱加煅石膏為君炒黑升麻為佐如有風加荊芥穗虛加熟地杞子如欲解毒加黃連連翹若穿牙疔毒則用消腫解毒之藥加紫花地丁等制三黃散法生地為君生蒲黃為臣牛黃為佐冰片為使共為細末用芭蕉根汁調敷患處或用扁柏汁加蜜亦可或生大黃蒲黃薑黃各一錢冰片一分麝香三釐白蜜調加蔥汁薑汁三匙或芭蕉根汁照前法此藥治頸癰面癰如腫硬不消因氣凝血滯或痰塊結而不散則兼陰症矣薑蔥汁為要此藥並治小兒丹毒制梅礬法袖珍論曰中寒脈多遲而緊挾風則脈帶浮眩暈不仁兼濕則脈濡而四肢疼痛用藥法一治單鵝雙鵝及連珠鵝吹碧丹五分金丹一分後金二碧三用吹痰兼服煎劑左加黃連犀角上加赤芍柴胡雙鵝兼用之大便不通加枳殼玄明粉候大便通則症自愈至三日看喉內但紅腫而無細白星即喉癰症一治喉癰金丹碧丹少許內服膏滋藥煎藥一治喉癬用碧丹頻吹膏滋藥不時噙咽再服煎劑加土貝下氣須戒忿怒憂思酒色忌食雞鵝魚蝦蟹豬首羊肉肝腸茄子黃瓜及一切辛辣炙煿動氣動火等物一月可愈一治喉菌初起碧丹五分金丹一分後用碧三金三和吹亦須頻咽膏滋藥煎劑不可間斷先將𫈄菰打汁搽上然後吹藥則速效一治舌䪞舌喉癰煎藥犀角地黃湯加減其舌䪞舌用金丹吹至舌根及舌下兩旁時刻不可間斷方能速效喉內用碧十金一亦須要勤吹一治纏喉風最為急症初起即用金碧二丹頻吹內服煎劑可救稍遲則不救藥須兼牛黃一治牙槽風用口疳藥加牛黃倍珍珠兒茶初治五日紫色退至白色再五日可長肉再五日方可望痊若成牙漏齒縫出血膿極難調治須戒酒色禁食一切毒物內服滋腎降火之劑外用頻吹藥耐心治之漸愈一治牙癰即口疳藥吹之一月愈一治牙咬先用金碧二丹吹入牙根外用黃熟香抉開牙再將金碧丹吹至咬處腫塊自消一治牙舌䪞先用金丹後用口疳藥多加薄荷冰片煎藥加石膏連翹一治牙宣內服扶脾清火之劑外用珍珠散止之生地三錢丹皮一錢梔子一錢荊芥八分煅石膏二錢白芍一錢麥冬一錢五分歸頭一錢知母一錢赤苓八分如小便赤色加木通大便閉結加玄明粉食後服若牙根腐爛用長肉藥吹之先宜服清胃之劑涼血之藥外用珍珠藥吹此指實火而言也若胃虛火動腐爛牙根外用長肉膏內用此方煎藥此分虛實火尤為確珍珠散龍骨一錢煅珍珠一錢兒茶五分海螵蛸一錢參三七二錢沒藥乳香去油各五分降香節一錢忌用鐵器象皮一錢炙脆硃砂五分冰片一釐各為法制細末將新棉花如指大捻成團蘸藥塞患處以指按之勿動二三次即止一治牙菌用口疳藥吹之兼用煎劑一治穿牙疔毒未破為疔用金丹略加碧丹吹之內服涼血降火解毒消疔之劑已破為毒用口疳藥加牛黃倍珍珠兒茶亦服煎藥為妙一治舌癰金碧二丹各半吹在舌根加黃連犀角山梔俱要多一治紫舌脹單用碧丹服犀角地黃湯加減一二日可愈一治木舌重舌初起先用金碧二丹後用金丹吹之內服煎劑雖凶不為害矣一治上顎癰用銀針挑破用口疳藥吹之碧丹亦可一治頸癰面癰托腮等症法防內攻須用碧丹吹之兼服煎劑外用三黃散敷於患處一治小兒走馬疳初生胎毒口疳及大人糜疳重者俱用口疳藥加牛黃珍珠如痧痘後口疳去龍骨加牛黃珍珠看輕重加減一治雪口先用絲綿卷箸蘸水攪去白醬用口疳藥吹之頻攪頻吹自愈內服犀角汁或犀角解毒亦可犀角一錢桔梗一兩赤芍五錢生地五錢甘草二錢朴硝二錢連翹六錢元參六錢力子五錢青黛二錢共為細末煉蜜為丸如龍眼大每服一丸薄荷湯下兼驚風硃砂為衣並治小兒諸飛丹毒及痧痘後餘毒一治小兒走馬疳先用溫水青絹繳淨以竹箸撥開牙關將銀簪淺淺挑出血繳淨用口疳藥吹之立愈一治走馬疳人中白二錢雞內脛煅青黛各一錢白礬三分冰片三分牛黃二釐共為末每用下吹患處先用薄荷湯或川連湯用綿包指頭洗淨口內方可吹之又方陳久醬茄炙乾煅灰存性吹之亦可一治口喉內結毒薄荷四分珍珠二分甘草八分牛黃一分冰片一分共為末吹之如痰飛結毒用上好掃盆少許喉症驗方緑袍散薄荷荊芥各五錢青黛制硝月石各二錢五分百藥煎甘草各一錢上為細末和勻乾點舌上令其自化或新汲水和白蜜調搽蘆薈散治口鼻發疳用蘆薈胡連兒茶薄荷各五分青黛硼砂各二分冰片五釐為細末吹患處冰黃散治口疳並治小兒丹毒冰片三分人中白一錢蒲黃二錢黃柏二錢甘草五分青黛五分川連二分薄荷二錢月石五分朴硝五分枯礬少許為末吹之十寶丹治口喉通用薄荷二兩甘草五錢梅礬一兩珍珠三錢兒茶一兩滴乳石四錢牛黃一錢冰片四錢血及三錢琥珀三錢共為細末冰片後研後加入又方治牙咬舌癰重舌喉蛾喉癰雞內脛不落水者佳金燈草青黛蒲黃白芷六角尖炙灰薄荷甘草研末冰片另研再和勻吹之喉癰半月其餘七日愈上清丸治風熱上湧頭目不清咽喉腫痛口舌生瘡服之生津液化痰涎薄荷十兩柿霜五兩桔梗四兩五錢甘草三兩五錢川芎二兩八錢百藥煎五錢防風一兩八錢砂仁四兩五錢建青黛三錢元參二兩五錢冰片硼砂皂角各二錢共為末煉蜜為丸如芡實大每服一丸不拘時含化清咽消腫飲甘草元參前胡薄荷大力子山梔黃連煅石膏連翹防風荊芥桔梗煎服玉鎖匙治牙關緊閉用巴豆壓油於紙上取油紙捻成條子點火將火吹滅以煙燻入鼻中蘇子降氣湯隨症加減半夏曲蘇子各五分甘草當歸各一錢玉桂陳皮各三分上厚朴一錢加薑棗煎服治虛火上升加減良方凡喉牙等症皆可治百草霜六錢梅礬一錢甘草三錢訶子肉三錢麵裹煨片腦不拘多少若治纏喉風寒等症梅礬一錢甘草三錢兒茶五錢須嫩紅者佳珍珠琥珀各六分雄黃二錢麝香少許薄荷一兩又有時去雄黃加蒲黃六錢若口碎口疳走馬疳胎疳痘後疳糜口雪口一切諸症專用黃袍散薄荷一兩甘草三錢舌腫大赤如熟豬肝色不能轉動川連三錢黃柏三錢片腦不拘驅腐丹硼砂二錢五倍子去蛀末二錢炒黑末用治糜口雪口吹喉散梅礬三錢薄荷二錢兒茶一錢五分乳石一錢五分煅水飛甘草火硝硼砂各一錢冰片三分瓷器收貯勿可出氣吹口方用棗子大者去核入明礬煅倍子梔子皮細蟆人中白均煅牛矢尖在野墳上取黃牛糞干久者佳各五錢珍珠五分冰片一分消腫代刀散治喉瘡不破用此藥吹之咳嗽一聲即破火硝將皮紙數層包好放在煙巨上烘以去咸氣換紙再烘研極細末薄荷此二味為君硼砂為臣大冰片少許為佐牙皂少許為使上五味共為細末瓷瓶收存遇有難破喉瘡吹之以代刀針又方乳香沒藥枯礬五倍子燒灰自出蠶蛾繭子殼小棗人指甲壁喜子窠燒灰各一個為末吹之立效真青百草霜半分燈草灰一釐薄荷一分冰片一分牙硝一分硼砂五分甘草一分真金蒲黃各二分口疳藥方較前更靈驗黃柏八分黃連一錢人中黃五分薄荷三分兒茶五分龍骨三分燈芯灰不拘多少珠子一分冰片六釐此口疳之祕方也不論症之輕重吹之無不立愈如爛至鼻根無救如癢加飛礬腐甚加青黛色黑加牛黃黃連齒落加牛黃
